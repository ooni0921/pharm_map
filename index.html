<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mellow PHARMACY - 분석 지도</title>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2223a20b252e059e82135b69bb10f001&autoload=false"></script>
    
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #e74c3c; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { width: 100%; height: 100%; background: #f0f0f0; }

        /* 하단 필터 바 */
        .mobile-filter {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
            background: white; padding: 15px 20px;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }
        .filter-row { display: flex; align-items: center; justify-content: space-between; }
        input[type="number"] { width: 50px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        button { padding: 10px 20px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: bold; }

        /* 숫자 배지 마커 스타일 */
        .number-marker {
            position: relative; background: var(--accent-color); color: white;
            font-weight: bold; font-size: 12px; padding: 4px 8px;
            border-radius: 15px; border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .number-marker:after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            margin-left: -6px; border-top: 8px solid var(--accent-color);
            border-left: 6px solid transparent; border-right: 6px solid transparent;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="mobile-filter">
    <div class="filter-row">
        <span style="font-weight:bold; font-size:14px;">최소 약사 수</span>
        <div style="display:flex; gap:8px;">
            <input type="number" id="minCnt" value="1">
            <button onclick="applyFilter()">적용</button>
        </div>
    </div>
    <div id="status" style="font-size:12px; color:#7f8c8d; text-align:center; margin-top:8px;">준비 중...</div>
</div>

<script>
    let map;
    let allData = [];
    let customOverlays = [];
    let infoWindow;

    // 핵심: kakao.maps.load 콜백을 사용하여 라이브러리가 완전히 로드된 후 실행합니다.
    function initMap() {
        kakao.maps.load(() => {
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(37.541, 127.056),
                level: 5
            };
            map = new kakao.maps.Map(container, options);
            infoWindow = new kakao.maps.InfoWindow({ removable: true });

            // 지도 로드 후 데이터 가져오기
            loadData();
        });
    }

    function loadData() {
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                applyFilter();
            })
            .catch(err => {
                document.getElementById('status').innerText = "데이터 로딩 에러";
            });
    }

    function applyFilter() {
        if (!map) return;
        const min = parseInt(document.getElementById('minCnt').value) || 0;
        
        customOverlays.forEach(o => o.setMap(null));
        customOverlays = [];

        const filtered = allData.filter(d => d.cnt >= min);
        document.getElementById('status').innerText = `${filtered.length}개 약국 표시 중`;

        filtered.forEach(item => {
            const content = document.createElement('div');
            content.className = 'number-marker';
            content.innerText = `${item.cnt}`;

            const overlay = new kakao.maps.CustomOverlay({
                position: new kakao.maps.LatLng(item.y, item.x),
                content: content,
                yAnchor: 1.4
            });

            overlay.setMap(map);
            customOverlays.push(overlay);

            content.addEventListener('click', () => {
                const infoContent = `
                    <div style="padding:10px; font-size:13px; min-width:150px;">
                        <strong>${item.name}</strong><br>
                        약사: ${item.cnt}명<br>
                        <small style="color:#888">${item.addr}</small>
                    </div>`;
                infoWindow.setContent(infoContent);
                infoWindow.open(map, overlay);
            });
        });
    }

    // 스크립트 로드 완료 시 initMap 실행
    window.onload = initMap;
</script>
</body>
</html>
