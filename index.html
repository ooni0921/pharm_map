<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전국 약국 분석 지도</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2223a20b252e059e82135b69bb10f001"></script>
    <style>
        /* 로딩 화면 스타일 */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #ddd;
            border-top: 5px solid #e74c3c; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 지도 및 필터 스타일 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { width: 100%; height: 100%; }
        .filter-bar {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;
            background: white; padding: 15px 20px 35px 20px;
            border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text" style="margin-top:20px; font-weight:bold;">전국 약국 데이터(26,000건) 로딩 중...</p>
    <p style="font-size:12px; color:#666;">네트워크 속도에 따라 최대 10초가 소요될 수 있습니다.</p>
</div>

<div id="map"></div>

<div class="filter-bar">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:bold;">최소 약사 수</span>
        <div style="display:flex; gap:8px;">
            <input type="number" id="minCnt" value="2" style="width:50px; text-align:center;">
            <button onclick="applyFilter()" style="padding:10px 20px; background:#2c3e50; color:white; border:none; border-radius:8px;">적용</button>
        </div>
    </div>
    <div id="status" style="font-size:12px; color:#888; text-align:center; margin-top:10px;"></div>
</div>

<script>
    let map;
    let allData = [];
    let overlays = [];
    let infoWindow;

    window.onload = function() {
        // 지도 초기화
        const container = document.getElementById('map');
        map = new kakao.maps.Map(container, {
            center: new kakao.maps.LatLng(37.5445, 127.0560),
            level: 4
        });
        infoWindow = new kakao.maps.InfoWindow({ removable: true });

        // 지도가 움직이면 현재 화면 마커만 갱신 (핵심!)
        kakao.maps.event.addListener(map, 'idle', updateVisibleMarkers);

        // 데이터 로드 시작
        fetch('data.json')
            .then(res => {
                if (!res.ok) throw new Error("파일을 찾을 수 없거나 네트워크 에러");
                return res.json();
            })
            .then(data => {
                allData = data;
                // 로딩 화면 숨기기
                document.getElementById('loading-overlay').style.display = 'none';
                updateVisibleMarkers();
            })
            .catch(err => {
                document.getElementById('loading-text').innerText = "로딩 실패: " + err.message;
                document.getElementById('loading-text').style.color = "red";
                console.error(err);
            });
    };

    function applyFilter() { updateVisibleMarkers(); }

    function updateVisibleMarkers() {
        if (!allData.length || !map) return;

        overlays.forEach(o => o.setMap(null));
        overlays = [];

        const min = parseInt(document.getElementById('minCnt').value) || 0;
        const bounds = map.getBounds();
        const sw = bounds.getSouthWest();
        const ne = bounds.getNorthEast();

        // 26,000개 중 현재 화면 범위만 필터링
        let filtered = allData.filter(d => {
            return d.pharmacists >= min &&
                   d.y >= sw.getLat() && d.y <= ne.getLat() &&
                   d.x >= sw.getLng() && d.x <= ne.getLng();
        });

        // 화면에는 최대 300개만 (브라우저 멈춤 방지)
        if (filtered.length > 300) {
            filtered = filtered.slice(0, 300);
            document.getElementById('status').innerText = "300개 초과로 일부만 표시 중 (확대 필요)";
        } else {
            document.getElementById('status').innerText = `화면 내 ${filtered.length}개 표시 중`;
        }

        filtered.forEach(item => {
            const content = document.createElement('div');
            content.className = 'badge-marker'; // 기존 CSS 스타일 필요
            content.style.cssText = "background:#e74c3c; color:white; font-weight:bold; padding:4px 8px; border-radius:15px; border:2px solid white; font-size:11px; cursor:pointer;";
            content.innerText = item.pharmacists;
            
            content.onclick = function() {
                const infoMsg = `<div style="padding:10px; font-size:13px;"><strong>${item.name}</strong><br>약사: ${item.pharmacists}명<br><small>${item.address}</small></div>`;
                infoWindow.setContent(infoMsg);
                infoWindow.setPosition(new kakao.maps.LatLng(item.y, item.x));
                infoWindow.open(map);
            };

            const overlay = new kakao.maps.CustomOverlay({
                position: new kakao.maps.LatLng(item.y, item.x),
                content: content,
                yAnchor: 1.4
            });
            overlay.setMap(map);
            overlays.push(overlay);
        });
    }
</script>
</body>
</html>
