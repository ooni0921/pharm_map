<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전국 약국 분석 지도</title>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2223a20b252e059e82135b69bb10f001"></script>
    
    <style>
        :root { --main: #2c3e50; --point: #e74c3c; --warning: #f39c12; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { width: 100%; height: 100%; background: #f4f4f4; }

        /* 하단 필터 바 */
        .filter-bar {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;
            background: white; padding: 15px 20px 30px 20px;
            border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }
        .filter-row { display: flex; align-items: center; justify-content: space-between; }
        input[type="number"] { width: 55px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        button { padding: 10px 20px; background: var(--main); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .status { font-size: 12px; color: #888; text-align: center; margin-top: 8px; line-height: 1.4; }
        .warning-text { color: var(--warning); font-weight: bold; }

        /* 숫자 배지 마커 스타일 */
        .badge-marker {
            position: relative; background: var(--point); color: white;
            font-weight: bold; font-size: 11px; padding: 4px 8px;
            border-radius: 15px; border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2); cursor: pointer;
        }
        .badge-marker::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            transform: translateX(-50%); border-top: 8px solid var(--point);
            border-left: 6px solid transparent; border-right: 6px solid transparent;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="filter-bar">
    <div class="filter-row">
        <span style="font-weight:bold; font-size:14px;">최소 약사 수</span>
        <div style="display:flex; gap:8px;">
            <input type="number" id="minCnt" value="2" min="0">
            <button onclick="applyFilter()">적용</button>
        </div>
    </div>
    <div id="status" class="status">데이터 로딩 중...</div>
</div>

<script>
    let map;
    let allData = [];
    let overlays = [];
    let infoWindow;

    window.onload = function() {
        const container = document.getElementById('map');
        const options = {
            // [수정] 성수역 인근(연무장길 중심) 좌표로 변경
            center: new kakao.maps.LatLng(37.5445, 127.0560), 
            level: 4 // 좀 더 상세하게 보이도록 레벨 조정
        };
        map = new kakao.maps.Map(container, options);
        infoWindow = new kakao.maps.InfoWindow({ removable: true });

        // 지도가 멈추면 화면 내 마커만 새로 그리기 (성능 최적화)
        kakao.maps.event.addListener(map, 'idle', updateVisibleMarkers);

        // 데이터 로드
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                updateVisibleMarkers();
            })
            .catch(err => {
                document.getElementById('status').innerText = "데이터 로딩 실패";
            });
    };

    function applyFilter() {
        updateVisibleMarkers();
    }

    function updateVisibleMarkers() {
        if (!allData.length || !map) return;

        // 기존 마커 싹 지우기
        overlays.forEach(o => o.setMap(null));
        overlays = [];

        const min = parseInt(document.getElementById('minCnt').value) || 0;
        const bounds = map.getBounds();
        const sw = bounds.getSouthWest();
        const ne = bounds.getNorthEast();

        // 1. 현재 화면 범위 + 필터링
        let filtered = allData.filter(d => {
            return d.pharmacists >= min &&
                   d.y >= sw.getLat() && d.y <= ne.getLat() &&
                   d.x >= sw.getLng() && d.x <= ne.getLng();
        });

        const statusEl = document.getElementById('status');
        const totalFound = filtered.length;

        // 2. 300개 제한 로직 (26,000개 데이터 대응)
        if (totalFound > 300) {
            filtered = filtered.slice(0, 300);
            statusEl.innerHTML = `<span class="warning-text">대상(${totalFound}개)이 너무 많아 300개만 표시합니다.</span><br>지도를 더 확대해 주세요.`;
        } else {
            statusEl.innerText = `현재 화면 내 ${totalFound}개의 약국 표시 중 (전체 ${allData.length}개)`;
        }

        // 3. 마커 렌더링
        filtered.forEach(item => {
            const content = document.createElement('div');
            content.className = 'badge-marker';
            content.innerText = `${item.pharmacists}`;
            
            content.onclick = function() {
                const infoMsg = `
                    <div style="padding:10px; font-size:13px; line-height:1.4;">
                        <strong>${item.name}</strong><br>
                        약사 수: <span style="color:red; font-weight:bold;">${item.pharmacists}명</span><br>
                        <small style="color:#666;">${item.address}</small>
                    </div>`;
                infoWindow.setContent(infoMsg);
                infoWindow.setPosition(new kakao.maps.LatLng(item.y, item.x));
                infoWindow.open(map);
            };

            const overlay = new kakao.maps.CustomOverlay({
                position: new kakao.maps.LatLng(item.y, item.x),
                content: content,
                yAnchor: 1.4
            });

            overlay.setMap(map);
            overlays.push(overlay);
        });
    }
</script>
</body>
</html>
