<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mellow PHARMACY - 약국 분석</title>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2223a20b252e059e82135b69bb10f001"></script>
    
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #e74c3c; /* 숫자 배지 색상 */ }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        #map { width: 100%; height: 100%; }

        /* 하단 필터 바 디자인 (모바일 최적화 유지) */
        .mobile-filter {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
            background: white; padding: 15px 20px;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 10px;
            transition: transform 0.3s ease; /* 접기/펴기 애니메이션 대비 */
        }
        
        .filter-row { display: flex; align-items: center; justify-content: space-between; }
        .filter-label { font-weight: bold; color: var(--primary-color); font-size: 14px; }
        
        .input-group { display: flex; align-items: center; gap: 8px; }
        input[type="number"] {
            width: 50px; padding: 10px; border: 1px solid #ddd; border-radius: 8px;
            text-align: center; font-size: 16px; 
        }
        
        button {
            padding: 10px 20px; background: var(--primary-color); color: white;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .status-text { font-size: 12px; color: #7f8c8d; text-align: center; margin-top: 5px; }

        /* [핵심] 숫자 표시 CustomOverlay 스타일 (핀 디자인) */
        .number-marker {
            position: relative;
            background: var(--accent-color);
            color: white;
            font-weight: bold;
            font-size: 13px;
            padding: 5px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            white-space: nowrap;
            cursor: pointer;
            border: 2px solid white;
        }
        /* 핀 뾰족한 부분 디자인 */
        .number-marker:after {
            content: '';
            position: absolute;
            bottom: -8px; /* 핀 높이 조정 */
            left: 50%;
            margin-left: -6px;
            border-top: 8px solid var(--accent-color);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
        }

        /* 정보창(InfoWindow) 커스텀 스타일 */
        .custom-info-window {
            padding: 10px; font-size: 14px; width: 180px; line-height: 1.4;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="mobile-filter">
    <div class="filter-row">
        <div class="filter-label">인원 필터 (최소 약사 수)</div>
        <div class="input-group">
            <input type="number" id="minCnt" value="1" min="0">
            <button onclick="applyFilter()">적용</button>
        </div>
    </div>
    <div id="status" class="status-text">데이터 로딩 중...</div>
</div>

<script>
    let map;
    let allData = [];
    let customOverlays = []; // 마커 대용 오버레이 저장 배열
    let infoWindow;

    window.onload = function() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.541, 127.056), // 성수동 기준
            level: 5 // 초기 줌 레벨
        };
        map = new kakao.maps.Map(container, options);
        
        // 줌 컨트롤 추가 (모바일 조작 편의성)
        const zoomControl = new kakao.maps.ZoomControl();
        map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

        infoWindow = new kakao.maps.InfoWindow({ removable: true });

        // 데이터 로드
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                applyFilter();
            })
            .catch(err => {
                document.getElementById('status').innerText = "데이터 로드 실패";
            });
    };

    function applyFilter() {
        const min = parseInt(document.getElementById('minCnt').value) || 0;
        
        // 기존 오버레이(마커) 제거
        customOverlays.forEach(overlay => overlay.setMap(null));
        customOverlays = [];
        infoWindow.close(); // 열려있는 정보창 닫기

        const filtered = allData.filter(d => d.cnt >= min);
        document.getElementById('status').innerText = `현재 조건: ${filtered.length}개의 약국 표시 중`;

        filtered.forEach(item => {
            const position = new kakao.maps.LatLng(item.y, item.x);

            # 1. 숫자 표시 커스텀 오버레이 HTML 생성
            const content = document.createElement('div');
            content.className = 'number-marker';
            content.innerText = `${item.cnt}명`; // 숫자 표시

            # 2. 커스텀 오버레이 객체 생성
            const overlay = new kakao.maps.CustomOverlay({
                position: position,
                content: content,
                yAnchor: 1.3 # 뾰족한 부분이 좌표에 딱 맞도록 수직 위치 조정
            });

            # 3. 지도에 표시
            overlay.setMap(map);
            customOverlays.push(overlay); // 배열에 저장 (나중에 지우기 위함)

            # 4. 클릭 이벤트 등록 (정보창 띄우기)
            # CustomOverlay는 이벤트 등록 방식이 마커와 다릅니다. (DOM 이벤트 사용)
            content.addEventListener('click', function() {
                const infoContent = `
                    <div class="custom-info-window">
                        <strong style="color:#2c3e50;">${item.name}</strong><br>
                        <span style="color:#e74c3c; font-weight:bold;">약사 수: ${item.cnt}명</span><br>
                        <small style="color:#888; font-size:11px;">${item.addr}</small>
                    </div>`;
                infoWindow.setContent(infoContent);
                infoWindow.open(map, overlay); // 오버레이 기준으로 정보창 열기
            });
        });
    }
</script>
</body>
</html>
