<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전국 약국 분석 지도</title>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2223a20b252e059e82135b69bb10f001"></script>
    
    <style>
        :root { 
            --main-color: #2c3e50; 
            --point-color: #e74c3c; 
            --stack-color: #8e44ad; 
            --naver-color: #03C75A;
            --warning-color: #f39c12;
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }
        #map { width: 100%; height: 100%; background: #f4f4f4; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid var(--point-color); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .filter-bar {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;
            background: white; padding: 15px 20px 35px 20px;
            border-radius: 24px 24px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
        }
        .filter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .title-area { font-size: 17px; font-weight: bold; color: var(--main-color); }
        
        .btn-group { display: flex; gap: 8px; align-items: center; }
        button { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        
        .btn-naver { background: var(--naver-color); color: white; padding: 10px 14px; font-size: 13px; }
        .btn-apply { background: var(--main-color); color: white; padding: 10px 18px; font-size: 14px; }
        
        input[type="number"] {
            width: 45px; padding: 10px; border: 1px solid #ddd; border-radius: 8px;
            text-align: center; font-size: 16px; font-weight: bold;
        }

        .status-msg { font-size: 12px; color: #888; text-align: center; line-height: 1.5; }
        .warning { color: var(--warning-color); font-weight: bold; }

        .badge-marker {
            position: relative; background: var(--point-color); color: white;
            font-weight: bold; font-size: 11px; padding: 4px 9px;
            border-radius: 15px; border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25); cursor: pointer;
            z-index: 10;
        }
        .badge-marker::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            transform: translateX(-50%); border-top: 8px solid var(--point-color);
            border-left: 6px solid transparent; border-right: 6px solid transparent;
        }

        .badge-marker.stacked {
            background: var(--stack-color); border-radius: 50%;
            width: 26px; height: 26px; padding: 0; display: flex; align-items: center; justify-content: center;
        }
        .badge-marker.stacked::after { border-top-color: var(--stack-color); }
        .badge-marker.stacked::before {
            content: ''; position: absolute; top: -4px; left: -4px;
            width: 100%; height: 100%; background: var(--stack-color);
            border-radius: 50%; border: 2px solid white; opacity: 0.5; z-index: -1;
        }

        .info-list { padding: 10px; font-size: 13px; line-height: 1.6; min-width: 190px; max-height: 220px; overflow-y: auto; }
        .info-item { border-bottom: 1px solid #eee; padding: 8px 0; }
        .info-item:last-child { border-bottom: none; }
        .info-header { font-weight:bold; color:var(--stack-color); font-size:14px; margin-bottom:10px; border-bottom:2px solid var(--stack-color); padding-bottom:5px;}
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p style="margin-top:20px; font-weight:bold; color:#333;">전국 약국 데이터 분석 중...</p>
</div>

<div id="map"></div>

<div class="filter-bar">
    <div class="filter-row">
        <div class="title-area">전국 약국 분석 지도</div>
        <div class="btn-group">
            <button class="btn-naver" onclick="openNaverRealEstate()">Naver 상가매물</button>
            <div style="display:flex; align-items:center; gap:5px; margin-left:5px;">
                <span style="font-size:11px; color:#666;">최소 약사</span>
                <input type="number" id="minCnt" value="2" min="0">
                <button class="btn-apply" onclick="applyFilter()">적용</button>
            </div>
        </div>
    </div>
    <div id="status" class="status-msg">지도를 움직여 분석을 시작하세요.</div>
</div>

<script>
    let map;
    let allData = [];
    let overlays = [];
    let infoWindow;

    window.onload = function() {
        const container = document.getElementById('map');
        map = new kakao.maps.Map(container, {
            center: new kakao.maps.LatLng(37.5445, 127.0560), 
            level: 4
        });
        infoWindow = new kakao.maps.InfoWindow({ removable: true, zIndex: 1000 });
        kakao.maps.event.addListener(map, 'idle', updateVisibleMarkers);

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                document.getElementById('loading-overlay').style.display = 'none';
                updateVisibleMarkers();
            });
    };

    function applyFilter() { updateVisibleMarkers(); }

    function openNaverRealEstate() {
        if (!map) return;
        const center = map.getCenter();
        const lat = center.getLat();
        const lng = center.getLng();
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const zoom = 20 - map.getLevel(); 
        
        if (isMobile) {
            window.open(`https://fin.land.naver.com/map?tradeTypes=B2&realEstateTypes=D02&floor=FLF01-FLF02-FLF03-FLF04-FLF05&center=${lng}-${lat}&zoom=${zoom}`, '_blank');
        } else {
            window.open(`https://new.land.naver.com/offices?ms=${lat},${lng},${zoom}&a=SG:SMS:GJCG:APTHGJ:GM:TJ&e=RETAIL`, '_blank');
        }
    }

    function updateVisibleMarkers() {
        if (!allData.length || !map) return;

        overlays.forEach(o => o.setMap(null));
        overlays = [];

        const min = parseInt(document.getElementById('minCnt').value) || 0;
        const bounds = map.getBounds();
        const sw = bounds.getSouthWest();
        const ne = bounds.getNorthEast();

        // 1. 화면 내 원본 데이터 필터링
        let visibleRaw = allData.filter(d => {
            return d.p >= min &&
                   d.y >= sw.getLat() && d.y <= ne.getLat() &&
                   d.x >= sw.getLng() && d.x <= ne.getLng();
        });

        // 2. 좌표별 그룹핑
        const groups = {};
        visibleRaw.forEach(item => {
            const key = `${item.y.toFixed(6)},${item.x.toFixed(6)}`;
            if (!groups[key]) groups[key] = [];
            groups[key].push(item);
        });

        const statusEl = document.getElementById('status');
        let groupKeys = Object.keys(groups);
        const totalGroups = groupKeys.length;

        // [복구] 300개 제한 로직: 좌표 그룹이 300개가 넘으면 잘라냅니다.
        if (totalGroups > 300) {
            groupKeys = groupKeys.slice(0, 300);
            statusEl.innerHTML = `<span class="warning">대상(${totalGroups}개)이 너무 많아 300개만 표시합니다. 지도를 확대하세요.</span>`;
        } else {
            statusEl.innerText = `현재 구역 ${totalGroups}개 위치 분석 중`;
        }

        // 3. 필터링된 그룹만 마커 생성
        groupKeys.forEach(key => {
            const items = groups[key];
            const [lat, lng] = key.split(',').map(Number);
            const content = document.createElement('div');
            
            if (items.length > 1) {
                content.className = 'badge-marker stacked';
                content.innerText = `${items.length}`; 
            } else {
                content.className = 'badge-marker';
                content.innerText = `${items[0].p}`; 
            }
            
            content.onclick = function() {
                let infoContent = `<div class="info-list">`;
                if (items.length > 1) {
                    const totalP = items.reduce((sum, curr) => sum + curr.p, 0);
                    infoContent += `<div class="info-header">밀집 구역 (${items.length}개소)<br><span style="font-size:11px;font-weight:normal;">합계 약사 ${totalP}명</span></div>`;
                }
                items.forEach(pharm => {
                    infoContent += `<div class="info-item"><strong>${pharm.n}</strong> <span style="color:var(--point-color);">(${pharm.p}명)</span><br><small>${pharm.a}</small></div>`;
                });
                infoContent += `</div>`;
                infoWindow.setContent(infoContent);
                infoWindow.setPosition(new kakao.maps.LatLng(lat, lng));
                infoWindow.open(map);
            };

            const overlay = new kakao.maps.CustomOverlay({
                position: new kakao.maps.LatLng(lat, lng),
                content: content,
                yAnchor: 1.4
            });
            overlay.setMap(map);
            overlays.push(overlay);
        });
    }
</script>
</body>
</html>
