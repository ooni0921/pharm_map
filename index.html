<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>약국 현황 분석 지도</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=여기에_자바스크립트_키_입력&autoload=false"></script>
    <style>
        body { margin: 0; font-family: 'Pretendard', sans-serif; }
        #map { width: 100%; height: 100vh; }
        .ui-panel {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 250px;
        }
        input[type="number"] { width: 60px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        button { 
            padding: 8px 15px; background: #222; color: white; border: none; 
            border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .info-window { padding: 15px; font-size: 13px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="ui-panel">
    <h2 style="margin:0 0 15px 0; font-size: 18px;">약국 인력 필터</h2>
    <div style="display: flex; align-items: center; gap: 10px;">
        <span>최소 약사 수:</span>
        <input type="number" id="minCnt" value="1" min="0">
        <button onclick="applyFilter()">적용</button>
    </div>
    <p id="status" style="font-size: 12px; color: #666; margin-top: 15px;"></p>
</div>

<div id="map"></div>

<script>
    let map;
    let allData = [];
    let markers = [];

    // 2. 카카오맵 라이브러리 로드 후 실행
    kakao.maps.load(function() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.541, 127.056), // 성수동 기준
            level: 7
        };
        map = new kakao.maps.Map(container, options);

        // 3. 데이터 로드
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                applyFilter();
            })
            .catch(err => console.error("JSON 로드 실패:", err));
    });

    function applyFilter() {
        const min = parseInt(document.getElementById('minCnt').value) || 0;
        
        // 기존 마커 제거
        markers.forEach(m => m.setMap(null));
        markers = [];

        const filtered = allData.filter(d => d.cnt >= min);
        document.getElementById('status').innerText = `총 ${filtered.length}개의 약국 표시 중`;

        filtered.forEach(item => {
            const marker = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(item.y, item.x),
                map: map
            });

            const infowindow = new kakao.maps.InfoWindow({
                content: `
                    <div class="info-window">
                        <strong>${item.name}</strong><br>
                        약사 수: ${item.cnt}명<br>
                        <small style="color:#888">${item.addr}</small>
                    </div>`,
                removable: true
            });

            kakao.maps.event.addListener(marker, 'click', () => {
                infowindow.open(map, marker);
            });

            markers.push(marker);
        });
    }
</script>
</body>
</html>
