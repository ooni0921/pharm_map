<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전국 약국 분석 지도</title>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2223a20b252e059e82135b69bb10f001"></script>
    
    <style>
        :root { 
            --main-color: #2c3e50; 
            --point-color: #e74c3c; 
            --naver-color: #03C75A;
            --warning-color: #f39c12;
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }
        #map { width: 100%; height: 100%; background: #f4f4f4; }

        /* 로딩 화면 레이어 */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid var(--point-color); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 하단 필터 컨트롤 바 */
        .filter-bar {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;
            background: white; padding: 15px 20px 35px 20px;
            border-radius: 24px 24px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
        }
        .filter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .title-area { font-size: 17px; font-weight: bold; color: var(--main-color); }
        
        .btn-group { display: flex; gap: 8px; align-items: center; }
        
        button { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        
        .btn-naver { background: var(--naver-color); color: white; padding: 10px 14px; font-size: 13px; }
        .btn-apply { background: var(--main-color); color: white; padding: 10px 18px; font-size: 14px; }
        
        input[type="number"] {
            width: 45px; padding: 10px; border: 1px solid #ddd; border-radius: 8px;
            text-align: center; font-size: 16px; font-weight: bold;
        }

        .status-msg { font-size: 12px; color: #888; text-align: center; line-height: 1.5; }
        .warning { color: var(--warning-color); font-weight: bold; }

        /* 숫자 표시 커스텀 마커 배지 */
        .badge-marker {
            position: relative; background: var(--point-color); color: white;
            font-weight: bold; font-size: 11px; padding: 4px 9px;
            border-radius: 20px; border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25); cursor: pointer;
        }
        .badge-marker::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            transform: translateX(-50%); border-top: 8px solid var(--point-color);
            border-left: 6px solid transparent; border-right: 6px solid transparent;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p style="margin-top:20px; font-weight:bold; color:#333;">전국 약국 데이터 로딩 중...</p>
    <p style="font-size:12px; color:#888;">잠시만 기다려 주세요.</p>
</div>

<div id="map"></div>

<div class="filter-bar">
    <div class="filter-row">
        <div class="title-area">전국 약국 분석 지도</div>
        <div class="btn-group">
            <button class="btn-naver" onclick="openNaverRealEstate()">Naver 상가매물</button>
            <div style="display:flex; align-items:center; gap:5px; margin-left:5px;">
                <span style="font-size:11px; color:#666;">최소 약사</span>
                <input type="number" id="minCnt" value="2" min="0">
                <button class="btn-apply" onclick="applyFilter()">적용</button>
            </div>
        </div>
    </div>
    <div id="status" class="status-msg">데이터 로딩 후 분석을 시작하세요.</div>
</div>

<script>
    let map;
    let allData = [];
    let overlays = [];
    let infoWindow;

    window.onload = function() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.5445, 127.0560), // 성수동 연무장길 중심
            level: 4
        };
        map = new kakao.maps.Map(container, options);
        infoWindow = new kakao.maps.InfoWindow({ removable: true, zIndex: 1000 });

        // 지도가 멈출 때 화면 내 데이터만 갱신
        kakao.maps.event.addListener(map, 'idle', updateVisibleMarkers);

        // 데이터 로드
        fetch('data.json')
            .then(res => {
                if (!res.ok) throw new Error("데이터 파일을 찾을 수 없습니다.");
                return res.json();
            })
            .then(data => {
                allData = data;
                document.getElementById('loading-overlay').style.display = 'none';
                updateVisibleMarkers();
            })
            .catch(err => {
                console.error(err);
                document.getElementById('status').innerHTML = "<span style='color:red;'>로딩 실패! 파일을 확인하세요.</span>";
            });
    };

    function applyFilter() {
        updateVisibleMarkers();
    }

    // [업데이트] 최신 네이버 부동산 URL 형식 적용 함수
    function openNaverRealEstate() {
        if (!map) return;
        const center = map.getCenter();
        const lat = center.getLat();
        const lng = center.getLng();
        
        // 카카오 4레벨 -> 네이버 약 16레벨 매칭
        const zoom = 20 - map.getLevel(); 
        
        // 알려주신 최신 URL 구조 반영 (ms=위도,경도,줌)
        // 상가/업무용 매물(RETAIL) 필터 유지
        const naverUrl = `https://new.land.naver.com/offices?ms=${lat},${lng},${zoom}&a=SG:SMS:GJCG:APTHGJ:GM:TJ&e=RETAIL`;
        window.open(naverUrl, '_blank');
    }

    function updateVisibleMarkers() {
        if (!allData.length || !map) return;

        overlays.forEach(o => o.setMap(null));
        overlays = [];

        const min = parseInt(document.getElementById('minCnt').value) || 0;
        const bounds = map.getBounds();
        const sw = bounds.getSouthWest();
        const ne = bounds.getNorthEast();

        // 필드명 유지: pharmacists, y, x
        let filtered = allData.filter(d => {
            return d.pharmacists >= min &&
                   d.y >= sw.getLat() && d.y <= ne.getLat() &&
                   d.x >= sw.getLng() && d.x <= ne.getLng();
        });

        const statusEl = document.getElementById('status');
        const totalFound = filtered.length;

        if (totalFound > 300) {
            filtered = filtered.slice(0, 300);
            statusEl.innerHTML = `<span class="warning">대상(${totalFound}개)이 너무 많아 300개만 표시합니다. 지도를 확대하세요.</span>`;
        } else {
            statusEl.innerText = `현재 구역 ${totalFound}개 약국 표시 중 (전체 ${allData.length}건)`;
        }

        filtered.forEach(item => {
            const content = document.createElement('div');
            content.className = 'badge-marker';
            content.innerText = `${item.pharmacists}`; 
            
            content.onclick = function() {
                // 필드명 유지: name, address
                const infoMsg = `
                    <div style="padding:15px; font-size:13px; line-height:1.4; min-width:160px;">
                        <strong style="color:var(--main-color); font-size:14px;">${item.name}</strong><br>
                        약사 인원: <span style="color:var(--point-color); font-weight:bold;">${item.pharmacists}명</span><br>
                        <hr style="border:0; border-top:1px solid #eee; margin:8px 0;">
                        <small style="color:#666;">${item.address}</small>
                    </div>`;
                infoWindow.setContent(infoMsg);
                infoWindow.setPosition(new kakao.maps.LatLng(item.y, item.x));
                infoWindow.open(map);
            };

            const overlay = new kakao.maps.CustomOverlay({
                position: new kakao.maps.LatLng(item.y, item.x),
                content: content,
                yAnchor: 1.4
            });

            overlay.setMap(map);
            overlays.push(overlay);
        });
    }
</script>
</body>
</html>
