<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mellow PHARMACY - 분석 지도</title>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2223a20b252e059e82135b69bb10f001"></script>
    
    <style>
        :root { --main: #2c3e50; --point: #e74c3c; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        #map { width: 100%; height: 100%; background: #eee; }

        /* 모바일 하단 필터 바 */
        .filter-bar {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;
            background: white; padding: 15px 20px 25px 20px;
            border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }
        .filter-row { display: flex; align-items: center; justify-content: space-between; }
        .input-box { display: flex; align-items: center; gap: 10px; }
        input[type="number"] { width: 55px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        button { padding: 10px 20px; background: var(--main); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status { font-size: 12px; color: #888; text-align: center; margin-top: 8px; }

        /* 숫자 마커(커스텀 오버레이) 스타일 */
        .badge-marker {
            position: relative; background: var(--point); color: white;
            font-weight: bold; font-size: 12px; padding: 4px 10px;
            border-radius: 20px; border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer;
        }
        .badge-marker::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            transform: translateX(-50%); border-top: 8px solid var(--point);
            border-left: 6px solid transparent; border-right: 6px solid transparent;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="filter-bar">
    <div class="filter-row">
        <span style="font-weight:bold;">최소 약사 수</span>
        <div class="input-box">
            <input type="number" id="minCnt" value="1">
            <button onclick="applyFilter()">적용</button>
        </div>
    </div>
    <div id="status" class="status">데이터를 불러오고 있습니다...</div>
</div>

<script>
    let map;
    let allData = [];
    let overlays = [];
    let infoWindow;

    // 라이브러리 로드 대기
    window.onload = function() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.541, 127.056), // 성수동 기준
            level: 5
        };
        map = new kakao.maps.Map(container, options);
        infoWindow = new kakao.maps.InfoWindow({ removable: true, zIndex: 200 });

        // 데이터 로딩
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                applyFilter();
            })
            .catch(err => {
                document.getElementById('status').innerText = "데이터 로드 실패 (파일 확인 요망)";
            });
    };

    function applyFilter() {
        if (!map) return;
        const min = parseInt(document.getElementById('minCnt').value) || 0;
        
        // 기존 오버레이 제거
        overlays.forEach(o => o.setMap(null));
        overlays = [];
        infoWindow.close();

        const filtered = allData.filter(d => d.cnt >= min);
        document.getElementById('status').innerText = `총 ${filtered.length}개의 약국이 표시됨`;

        filtered.forEach(item => {
            // 커스텀 오버레이 생성
            const content = document.createElement('div');
            content.className = 'badge-marker';
            content.innerText = `${item.cnt}`;
            
            // 클릭 시 정보창 열기
            content.onclick = function() {
                const infoMsg = `
                    <div style="padding:15px; font-size:13px; line-height:1.4;">
                        <strong>${item.name}</strong><br>
                        약사 수: <span style="color:red; font-weight:bold;">${item.cnt}명</span><br>
                        <small style="color:#666;">${item.addr}</small>
                    </div>`;
                infoWindow.setContent(infoMsg);
                infoWindow.setPosition(new kakao.maps.LatLng(item.y, item.x));
                infoWindow.open(map);
            };

            const overlay = new kakao.maps.CustomOverlay({
                position: new kakao.maps.LatLng(item.y, item.x),
                content: content,
                yAnchor: 1.4
            });

            overlay.setMap(map);
            overlays.push(overlay);
        });

        // 결과가 있다면 첫 데이터로 지도 이동
        if (filtered.length > 0) {
            map.setCenter(new kakao.maps.LatLng(filtered[0].y, filtered[0].x));
        }
    }
</script>
</body>
</html>
